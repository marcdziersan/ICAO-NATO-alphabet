<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - ICAO/NATO/IMO Alphabet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .offline-container {
      max-width: 500px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .retry-btn {
      background: white;
      color: #2c3e50;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .retry-btn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      The ICAO/NATO/IMO Spelling Alphabet app needs an internet connection
      to load the latest data and speech synthesis features.
    </p>
    <p style="font-size: 0.9rem; opacity: 0.7;">
      Please check your connection and try again.
    </p>
    <button class="retry-btn" onclick="location.reload()">⟳ Retry Connection</button>
  </div>
</body>
</html>
